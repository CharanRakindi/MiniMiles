<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mini Miles</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js" defer></script>
</head>
<body class="register-page">
    <header>
        <!-- Header content will be dynamically inserted by header.js -->
    </header>

    <div class="main-content">
        <div class="form-container">
            <h2>Create Account</h2>
            <div id="register-message" class="message success-message"></div>
            <div id="register-error" class="message error-message"></div>
            <form id="register-form" method="POST" action="register.php">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="reg_email">Email Address</label>
                    <input type="email" id="reg_email" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="reg_password">Password</label>
                    <input type="password" id="reg_password" name="password" placeholder="Choose a password" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            
            <div class="form-links">
                <span>Already have an account?</span>
                <a href="/login.html" class="login-link">Sign In</a>
            </div>
        </div>
    </div>

    <footer>
        <!-- Will be populated by footer.js -->
    </footer>
    <script src="js/footer.js"></script>
</body>
</html>
