<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mini Miles</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js" defer></script>
</head>
<body class="login-page">
    <header>
        <!-- Header content will be dynamically inserted by header.js -->
    </header>

    <div class="main-content">
        <div class="form-container">
            <h2>Login</h2>
            <div id="login-message" class="message success-message"></div>
            <div id="login-error" class="message error-message"></div>
            <form id="login-form" action="login.php" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            
            <div class="form-links">
                <a href="/" class="back-link">Back to Home</a>
                <a href="/register.html" class="register-link">Create Account</a>
            </div>
        </div>
    </div>

    <footer>
        <!-- Will be populated by footer.js -->
    </footer>
    <script src="js/footer.js"></script>
</body>
</html>
